<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карточка товара - 3D Models Shop</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                3D Models <span>Store</span>
            </div>
            <ul class="nav-menu">
                <li><a href="/"><i class="fas fa-home"></i> Главная</a></li>
                <li><a href="/catalog"><i class="fas fa-cube"></i> Каталог</a></li>
                <li><a href="/cart" class="cart-icon">
                    <i class="fas fa-shopping-cart"></i> Корзина
                </a></li>
                <li><a href="/profile"><i class="fas fa-user"></i> Профиль</a></li>
                <!-- Кнопка авторизации будет добавлена через JavaScript -->
            </ul>
        </div>
    </nav>

    <main class="main-container">
        <div class="product-page">
            <button class="back-button" onclick="goBack()">
                <i class="fas fa-arrow-left"></i> Вернуться назад
            </button>

            <div class="product-detail" id="productDetail">
                <!-- Данные товара будут загружены через JavaScript -->
            </div>
        </div>
    </main>

    <script src="/static/js/main.js"></script>
    <script src="/static/js/product.js"></script>
    <script src="/static/js/auth.js"></script>
</body>
</html>
