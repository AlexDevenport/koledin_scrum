<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина - 3D Models Shop</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                3D Models <span>Store</span>
            </div>
            <ul class="nav-menu">
                <li><a href="/"><i class="fas fa-home"></i> Главная</a></li>
                <li><a href="/catalog"><i class="fas fa-cube"></i> Каталог</a></li>
                <li><a href="/cart" class="cart-icon">
                    <i class="fas fa-shopping-cart"></i> Корзина
                    <span id="cartCount" class="cart-count">0</span>
                </a></li>
                <li><a href="/profile"><i class="fas fa-user"></i> Профиль</a></li>
                <!-- Кнопка авторизации будет добавлена через JavaScript -->
            </ul>
        </div>
    </nav>

    <main class="main-container">
        <h1 style="color: var(--dark-blue); margin-bottom: 2rem;">Корзина</h1>
        
        <div class="cart-container" id="cartContainer">
            <!-- Корзина будет загружаться через JavaScript -->
        </div>
    </main>

    <script src="/static/js/main.js"></script>
    <script src="/static/js/cart.js"></script>
    <script src="/static/js/auth.js"></script>
</body>
</html>
